<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FC Tegernheim · Platzbelegung</title>
<link rel="icon" href="logo.png">
<script src="qrcode.min.js"></script>
<style>
  :root{
    --rot:#e10707; --rot-dunkel:#780404; --rot-hell:#fdeaea;
    --schwarz:#1a1d21; --grau:#5b6570; --grau-hell:#eef0f2; --linie:#dde1e5;
    --weiss:#fff; --gruen:#2e9e4f;
    --radius:12px;
    --schatten:0 1px 3px rgba(0,0,0,.10),0 4px 14px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f7f8f9;color:var(--schwarz);font-size:15px;line-height:1.45;padding-bottom:90px}

  /* ---------- Kopf ---------- */
  header{background:linear-gradient(135deg,var(--rot) 0%,var(--rot-dunkel) 100%);color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;box-shadow:var(--schatten);
    position:sticky;top:0;z-index:40}
  .kopfzeile{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto}
  .kopfzeile img{width:46px;height:51px;background:#fff;border-radius:8px;padding:2px}
  .kopfzeile h1{font-size:18px;font-weight:800;letter-spacing:.2px}
  .kopfzeile .sub{font-size:12px;opacity:.85;font-weight:500}
  .modus{margin-left:auto;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;
    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);white-space:nowrap}
  .modus.edit{background:#fff;color:var(--rot-dunkel)}

  nav{display:flex;gap:6px;max-width:1100px;margin:12px auto 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  nav button{flex:0 0 auto;border:0;background:rgba(255,255,255,.14);color:#fff;font-weight:600;
    font-size:13px;padding:8px 14px;border-radius:99px;cursor:pointer}
  nav button.aktiv{background:#fff;color:var(--rot-dunkel)}

  main{max-width:1100px;margin:16px auto;padding:0 12px}

  /* ---------- Wochen-Navigation ---------- */
  .wochennav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .wochennav h2{font-size:16px;font-weight:800;flex:1;text-align:center}
  .pfeil,.heute-btn{border:1px solid var(--linie);background:#fff;border-radius:10px;cursor:pointer;
    font-size:15px;font-weight:700;color:var(--schwarz);padding:7px 12px;box-shadow:var(--schatten)}
  .heute-btn{font-size:13px;color:var(--rot)}

  /* ---------- Wochenplan ---------- */
  .plan{display:grid;gap:10px}
  .tag-block{background:#fff;border-radius:var(--radius);box-shadow:var(--schatten);overflow:hidden}
  .tag-block.heute{outline:2px solid var(--rot)}
  .tag-kopf{display:flex;align-items:baseline;gap:8px;padding:9px 14px;background:var(--schwarz);color:#fff}
  .tag-kopf .tagname{font-weight:800;font-size:14px}
  .tag-kopf .tagdatum{font-size:12px;opacity:.75}
  .tag-kopf .heute-tag{margin-left:auto;font-size:10px;font-weight:800;background:var(--rot);
    padding:2px 8px;border-radius:99px;letter-spacing:.5px}
  .platz-zeilen{display:grid}
  @media(min-width:760px){.platz-zeilen{grid-template-columns:repeat(4,1fr)}}
  .platz-zelle{padding:8px 10px;border-top:1px solid var(--grau-hell);min-height:44px}
  @media(min-width:760px){.platz-zelle{border-left:1px solid var(--grau-hell);border-top:0;min-height:70px}}
  .platz-zelle .platzname{font-size:11px;font-weight:700;color:var(--grau);text-transform:uppercase;
    letter-spacing:.4px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .platz-zelle .platzname .plus{margin-left:auto;border:0;background:var(--grau-hell);color:var(--grau);
    width:20px;height:20px;border-radius:6px;font-size:14px;line-height:1;cursor:pointer;font-weight:700}
  .platz-zelle .platzname .plus:hover{background:var(--rot);color:#fff}

  .buchung{border-radius:9px;padding:6px 9px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;
    background:var(--rot-hell);border-color:#f5c6c6}
  .buchung.training{background:var(--grau-hell);border-color:var(--linie)}
  .buchung .zeile1{display:flex;gap:6px;align-items:center;font-size:12.5px;font-weight:800}
  .buchung .zeit{font-variant-numeric:tabular-nums;color:var(--rot-dunkel)}
  .buchung.training .zeit{color:var(--schwarz)}
  .buchung .typ{margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.5px;padding:1px 7px;
    border-radius:99px;background:var(--rot);color:#fff}
  .buchung.training .typ{background:var(--grau)}
  .buchung .zeile2{font-size:12px;color:var(--schwarz);margin-top:1px}
  .buchung .zeile3{font-size:11px;color:var(--grau);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap}
  .leer{font-size:12px;color:#b6bdc4;font-style:italic}

  /* ---------- Liste ---------- */
  .liste-datum{font-size:13px;font-weight:800;color:var(--grau);margin:18px 2px 8px;text-transform:uppercase;letter-spacing:.5px}
  .liste-karte{background:#fff;border-radius:var(--radius);box-shadow:var(--schatten);padding:10px 14px;margin-bottom:8px;
    display:flex;gap:12px;align-items:center;cursor:pointer;border-left:4px solid var(--rot)}
  .liste-karte.training{border-left-color:var(--grau)}
  .liste-karte .lz{font-weight:800;font-variant-numeric:tabular-nums;font-size:13px;min-width:86px}
  .liste-karte .lm{flex:1}
  .liste-karte .lm b{font-size:14px}
  .liste-karte .lm .klein{font-size:12px;color:var(--grau)}

  /* ---------- Stammdaten ---------- */
  .karte{background:#fff;border-radius:var(--radius);box-shadow:var(--schatten);padding:16px;margin-bottom:14px}
  .karte h3{font-size:15px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .karte h3 .punkt{width:9px;height:9px;border-radius:99px;background:var(--rot);display:inline-block}
  .karte .hinweis{font-size:12.5px;color:var(--grau);margin-bottom:12px}
  .sd-zeile{display:flex;gap:8px;align-items:center;padding:7px 0;border-top:1px solid var(--grau-hell)}
  .sd-zeile input{flex:1;min-width:0}
  .sd-zeile .loeschen{border:0;background:none;color:var(--grau);cursor:pointer;font-size:16px;padding:4px 6px}
  .sd-zeile .loeschen:hover{color:var(--rot)}
  .hinzu{margin-top:10px;display:flex;gap:8px}
  .hinzu input{flex:1}

  input,select,textarea{font:inherit;border:1px solid var(--linie);border-radius:9px;padding:8px 10px;
    background:#fff;color:var(--schwarz);width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--rot);outline-offset:-1px;border-color:var(--rot)}
  label{font-size:12px;font-weight:700;color:var(--grau);display:block;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.4px}

  .btn{border:0;border-radius:10px;padding:10px 18px;font-weight:800;font-size:14px;cursor:pointer;
    background:var(--rot);color:#fff}
  .btn:hover{background:var(--rot-dunkel)}
  .btn.zweit{background:var(--grau-hell);color:var(--schwarz)}
  .btn.gefahr{background:#fff;color:var(--rot);border:1px solid var(--rot)}
  .btn:disabled{opacity:.5;cursor:default}

  /* ---------- Segment-Schalter Spiel/Training ---------- */
  .segment{display:flex;background:var(--grau-hell);border-radius:10px;padding:3px;gap:3px}
  .segment button{flex:1;border:0;background:none;padding:8px;border-radius:8px;font-weight:800;
    font-size:13.5px;cursor:pointer;color:var(--grau)}
  .segment button.aktiv{background:var(--rot);color:#fff}
  .segment button.aktiv.training{background:var(--schwarz)}

  /* ---------- Modal ---------- */
  .modal-hg{position:fixed;inset:0;background:rgba(20,22,25,.5);z-index:60;display:flex;
    align-items:flex-end;justify-content:center}
  @media(min-width:600px){.modal-hg{align-items:center}}
  .modal{background:#fff;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
    border-radius:18px 18px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom) + 20px)}
  @media(min-width:600px){.modal{border-radius:18px}}
  .modal h2{font-size:17px;font-weight:800;margin-bottom:2px}
  .modal .m-fuss{display:flex;gap:10px;margin-top:20px}
  .modal .m-fuss .btn{flex:1}
  .zeit-reihe{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .warnung{background:#fff7e6;border:1px solid #f2d492;color:#8a6100;border-radius:10px;
    padding:9px 12px;font-size:13px;margin-top:12px}

  /* ---------- FAB ---------- */
  .fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:50;
    width:58px;height:58px;border-radius:99px;border:0;background:var(--rot);color:#fff;font-size:30px;
    font-weight:400;cursor:pointer;box-shadow:0 6px 20px rgba(225,7,7,.45);line-height:1}
  .fab:hover{background:var(--rot-dunkel)}

  /* ---------- QR-Seite ---------- */
  .qr-raster{display:grid;gap:14px}
  @media(min-width:700px){.qr-raster{grid-template-columns:1fr 1fr}}
  .qr-karte{text-align:center}
  .qr-karte .qr-box{display:flex;justify-content:center;margin:14px 0}
  .qr-karte svg{width:210px;height:210px}
  .qr-karte .qr-titel{font-size:15px;font-weight:800}
  .qr-karte .qr-unter{font-size:12.5px;color:var(--grau);margin-top:2px}
  .qr-karte .url{font-size:11px;color:var(--grau);word-break:break-all;margin-top:8px;
    background:var(--grau-hell);border-radius:8px;padding:6px 8px}
  .intern-band{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.6px;color:#fff;
    background:var(--rot);border-radius:99px;padding:2px 10px;margin-bottom:6px}
  .extern-band{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.6px;color:#fff;
    background:var(--schwarz);border-radius:99px;padding:2px 10px;margin-bottom:6px}

  .banner{max-width:1100px;margin:10px auto 0;padding:0 12px}
  .banner>div{border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600}
  .banner .offline{background:#fff7e6;border:1px solid #f2d492;color:#8a6100}
  .banner .fehler{background:var(--rot-hell);border:1px solid #f5c6c6;color:var(--rot-dunkel)}

  .status-punkt{width:8px;height:8px;border-radius:99px;display:inline-block;margin-right:6px}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 88px);
    background:var(--schwarz);color:#fff;font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:99px;
    z-index:80;box-shadow:var(--schatten);white-space:nowrap}

  /* ---------- Druck ---------- */
  @media print{
    body{background:#fff;padding:0}
    header,.fab,nav,.wochennav,.kein-druck,.banner{display:none!important}
    .nur-druck{display:block!important}
    .karte{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  }
  .nur-druck{display:none}
</style>
</head>
<body>

<header>
  <div class="kopfzeile">
    <img src="logo.png" alt="FC Tegernheim Wappen">
    <div>
      <h1>FC Tegernheim</h1>
      <div class="sub">Platzbelegung &amp; Kabinenplan</div>
    </div>
    <span class="modus" id="modusBadge">Ansicht</span>
  </div>
  <nav id="hauptNav"></nav>
</header>

<div class="banner" id="banner"></div>
<main id="app"></main>
<button class="fab" id="fab" title="Neue Buchung" style="display:none">+</button>

<script>
'use strict';

/* ================= Grunddaten & Zustand ================= */
const STANDARD_DATEN = {
  version: 1,
  config: {
    vereinsname: "FC Tegernheim",
    plaetze: [
      { id:"p1", name:"Platz 1", verantwortlicher:"" },
      { id:"p2", name:"Platz 2", verantwortlicher:"" },
      { id:"p3", name:"Platz Am Damm", verantwortlicher:"" },
      { id:"p4", name:"Kleinfeld", verantwortlicher:"" }
    ],
    kabinen: ["Heim 1","Heim 2","Gast 1","Gast 2"],
    mannschaften: ["1. Mannschaft","2. Mannschaft","Damen","A-Jugend","B-Jugend","AH"],
    trainer: []
  },
  buchungen: []
};

let S = JSON.parse(JSON.stringify(STANDARD_DATEN)); // aktueller Datenstand
let ansicht = 'woche';            // woche | liste | stammdaten | qr
let wochenStart = montagVon(new Date());
let offlineModus = false;         // kein Repo erreichbar -> localStorage
let speichertGerade = false;

/* ================= Hilfen ================= */
const $ = s => document.querySelector(s);
const esc = t => String(t ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const TAGE = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];

function montagVon(d){ d = new Date(d); const t = (d.getDay()+6)%7; d.setDate(d.getDate()-t); d.setHours(0,0,0,0); return d; }
function isoDatum(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function deDatum(iso){ const [j,m,t] = iso.split('-'); return t+'.'+m+'.'+j; }
function neueId(){ return 'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function ueberlappt(a,b){ return a.datum===b.datum && a.von < b.bis && b.von < a.bis; }
function utf8b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64utf8(str){ return decodeURIComponent(escape(atob(str))); }

function toast(text){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

/* ================= Repo & Token ================= */
// Auf GitHub Pages werden Besitzer und Repo automatisch aus der URL erkannt.
function ermittleRepo(){
  const h = location.hostname, teil = location.pathname.split('/').filter(Boolean);
  if (h.endsWith('.github.io') && teil.length) return h.split('.')[0] + '/' + teil[0];
  return localStorage.getItem('fct_repo') || '';
}
function holeToken(){ return localStorage.getItem('fct_token') || ''; }
function istEditModus(){ return !!holeToken(); }

// Token aus dem internen QR-Link (#k=...) übernehmen und URL bereinigen
(function tokenAusUrl(){
  const m = location.hash.match(/[#&]k=([^&]+)/);
  if (m) {
    try { localStorage.setItem('fct_token', b64utf8(decodeURIComponent(m[1]))); } catch(e){}
    history.replaceState(null, '', location.pathname + location.search);
  }
})();

/* ================= Laden & Speichern (GitHub) ================= */
async function ladeDaten(){
  const repo = ermittleRepo();
  if (repo) {
    try {
      const kopf = { 'Accept':'application/vnd.github.raw+json' };
      if (holeToken()) kopf['Authorization'] = 'Bearer ' + holeToken();
      const antwort = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json?t='+Date.now(), { headers: kopf });
      if (antwort.ok) {
        S = normalisiere(await antwort.json());
        localStorage.setItem('fct_cache', JSON.stringify(S));
        offlineModus = false;
        return;
      }
    } catch(e){ /* Repo nicht erreichbar */ }
    // Repo konfiguriert, aber nicht erreichbar: letzter bekannter Server-Stand
    const cache = localStorage.getItem('fct_cache');
    if (cache) { try { S = normalisiere(JSON.parse(cache)); } catch(e){} }
    offlineModus = true;
    return;
  }
  // Lokaler Modus (kein Repo): eigene Änderungen haben Vorrang vor der mitgelieferten data.json
  offlineModus = true;
  const lokal = localStorage.getItem('fct_lokal');
  if (lokal) { try { S = normalisiere(JSON.parse(lokal)); return; } catch(e){} }
  try {
    const antwort = await fetch('data.json?t='+Date.now());
    if (antwort.ok) S = normalisiere(await antwort.json());
  } catch(e){}
}

function normalisiere(d){
  const basis = JSON.parse(JSON.stringify(STANDARD_DATEN));
  if (!d || typeof d !== 'object') return basis;
  d.config = Object.assign(basis.config, d.config || {});
  d.buchungen = Array.isArray(d.buchungen) ? d.buchungen : [];
  return d;
}

// Jede Änderung wird als Mutation auf den frischesten Server-Stand angewendet,
// damit parallele Buchungen anderer Trainer nicht überschrieben werden.
async function speichere(mutation, meldung){
  mutation(S); render();                      // sofort lokal anwenden (optimistisch)
  if (offlineModus || !ermittleRepo()) {
    localStorage.setItem('fct_lokal', JSON.stringify(S));
    toast('Lokal gespeichert (kein Repo verbunden)');
    return true;
  }
  if (!holeToken()) { toast('Kein Zugangsschlüssel – Änderung nur lokal'); return false; }
  speichertGerade = true; render();
  const repo = ermittleRepo();
  try {
    for (let versuch = 0; versuch < 2; versuch++) {
      const meta = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json?t='+Date.now(), {
        headers: { 'Authorization':'Bearer '+holeToken(), 'Accept':'application/vnd.github+json' }
      });
      if (!meta.ok) throw new Error('Lesen fehlgeschlagen ('+meta.status+')');
      const info = await meta.json();
      const server = normalisiere(JSON.parse(b64utf8(info.content.replace(/\n/g,''))));
      mutation(server);                        // Mutation auf Server-Stand anwenden
      const put = await fetch('https://api.github.com/repos/'+repo+'/contents/data.json', {
        method: 'PUT',
        headers: { 'Authorization':'Bearer '+holeToken(), 'Accept':'application/vnd.github+json' },
        body: JSON.stringify({ message: meldung, content: utf8b64(JSON.stringify(server, null, 2)), sha: info.sha })
      });
      if (put.ok) {
        S = server;
        localStorage.setItem('fct_cache', JSON.stringify(S));
        speichertGerade = false; render();
        toast('Gespeichert ✓');
        return true;
      }
      if (put.status !== 409 && put.status !== 422) throw new Error('Speichern fehlgeschlagen ('+put.status+')');
      // bei Konflikt: Schleife holt frischen Stand und versucht es erneut
    }
    throw new Error('Konflikt beim Speichern – bitte erneut versuchen');
  } catch (e) {
    speichertGerade = false; render();
    toast('⚠ ' + e.message);
    return false;
  }
}

/* ================= Navigation & Rendering ================= */
function render(){
  // Kopf
  const badge = $('#modusBadge');
  if (speichertGerade) { badge.textContent = 'Speichert …'; badge.className = 'modus edit'; }
  else if (istEditModus()) { badge.textContent = '✎ Trainer-Zugang'; badge.className = 'modus edit'; }
  else { badge.textContent = 'Nur Ansicht'; badge.className = 'modus'; }

  const punkte = [['woche','Wochenplan'],['liste','Liste']];
  if (istEditModus()) punkte.push(['stammdaten','Stammdaten']);
  punkte.push(['qr', istEditModus() ? 'QR-Codes' : '⚙ Zugang']);
  $('#hauptNav').innerHTML = punkte.map(([id,name]) =>
    '<button class="'+(ansicht===id?'aktiv':'')+'" onclick="wechsle(\''+id+'\')">'+name+'</button>').join('');

  // Banner
  let banner = '';
  if (offlineModus) banner = '<div class="offline">Lokaler Modus – noch kein GitHub-Repo verbunden. Änderungen werden nur auf diesem Gerät gespeichert.</div>';
  $('#banner').innerHTML = banner;

  $('#fab').style.display = (istEditModus() && (ansicht==='woche'||ansicht==='liste')) ? '' : 'none';

  if (ansicht==='woche') renderWoche();
  else if (ansicht==='liste') renderListe();
  else if (ansicht==='stammdaten') renderStammdaten();
  else if (ansicht==='qr') renderQr();
}
function wechsle(z){ ansicht = z; render(); window.scrollTo({top:0}); }

/* ---------- Wochenplan ---------- */
function renderWoche(){
  const heute = isoDatum(new Date());
  const ende = new Date(wochenStart); ende.setDate(ende.getDate()+6);
  const kw = kalenderwoche(wochenStart);
  let html = '<div class="wochennav">'
    + '<button class="pfeil" onclick="schiebeWoche(-1)">‹</button>'
    + '<h2>KW '+kw+' · '+deDatum(isoDatum(wochenStart)).slice(0,6)+' – '+deDatum(isoDatum(ende))+'</h2>'
    + '<button class="pfeil" onclick="schiebeWoche(1)">›</button>'
    + '<button class="heute-btn" onclick="geheHeute()">Heute</button></div><div class="plan">';

  for (let i=0;i<7;i++){
    const d = new Date(wochenStart); d.setDate(d.getDate()+i);
    const iso = isoDatum(d);
    const istHeute = iso===heute;
    html += '<div class="tag-block'+(istHeute?' heute':'')+'"><div class="tag-kopf">'
      + '<span class="tagname">'+TAGE[i]+'</span><span class="tagdatum">'+deDatum(iso)+'</span>'
      + (istHeute?'<span class="heute-tag">HEUTE</span>':'')+'</div><div class="platz-zeilen">';
    for (const platz of S.config.plaetze){
      const bs = S.buchungen.filter(b=>b.datum===iso && b.platzId===platz.id).sort((a,b)=>a.von.localeCompare(b.von));
      html += '<div class="platz-zelle"><div class="platzname">'+esc(platz.name)
        + (istEditModus() ? '<button class="plus" title="Buchung anlegen" onclick="oeffneBuchung(null,\''+platz.id+'\',\''+iso+'\')">+</button>' : '')
        + '</div>';
      if (!bs.length) html += '<div class="leer">frei</div>';
      for (const b of bs) html += buchungsChip(b);
      html += '</div>';
    }
    html += '</div></div>';
  }
  $('#app').innerHTML = html + '</div>';
}

function buchungsChip(b){
  const kl = b.typ==='Training' ? ' training' : '';
  return '<div class="buchung'+kl+'" onclick="oeffneBuchung(\''+b.id+'\')">'
    + '<div class="zeile1"><span class="zeit">'+esc(b.von)+'–'+esc(b.bis)+'</span>'
    + '<span class="typ">'+(b.typ==='Training'?'TRAINING':'SPIEL')+'</span></div>'
    + '<div class="zeile2"><b>'+esc(b.mannschaft)+'</b></div>'
    + '<div class="zeile3">'
    + (b.trainer ? '<span>👤 '+esc(b.trainer)+'</span>' : '')
    + (b.kabine ? '<span>🚪 '+esc(b.kabine)+'</span>' : '')
    + '</div></div>';
}

function schiebeWoche(n){ wochenStart.setDate(wochenStart.getDate()+7*n); render(); }
function geheHeute(){ wochenStart = montagVon(new Date()); render(); }
function kalenderwoche(d){
  d = new Date(d); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const w1 = new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w1)/864e5-3+((w1.getDay()+6)%7))/7);
}

/* ---------- Liste ---------- */
function renderListe(){
  const heute = isoDatum(new Date());
  const kommend = S.buchungen.filter(b=>b.datum>=heute)
    .sort((a,b)=> a.datum===b.datum ? a.von.localeCompare(b.von) : a.datum.localeCompare(b.datum));
  let html = '<div class="wochennav"><h2>Kommende Belegungen</h2></div>';
  if (!kommend.length) html += '<div class="karte"><div class="hinweis" style="margin:0">Keine kommenden Buchungen.</div></div>';
  let letztesDatum = '';
  for (const b of kommend){
    if (b.datum!==letztesDatum){
      const d = new Date(b.datum+'T12:00');
      html += '<div class="liste-datum">'+TAGE[(d.getDay()+6)%7]+', '+deDatum(b.datum)+'</div>';
      letztesDatum = b.datum;
    }
    const platz = S.config.plaetze.find(p=>p.id===b.platzId);
    html += '<div class="liste-karte'+(b.typ==='Training'?' training':'')+'" onclick="oeffneBuchung(\''+b.id+'\')">'
      + '<div class="lz">'+esc(b.von)+'–'+esc(b.bis)+'</div>'
      + '<div class="lm"><b>'+esc(b.mannschaft)+'</b> · '+(b.typ==='Training'?'Training':'Spiel')
      + '<div class="klein">'+esc(platz?platz.name:'?')
      + (b.trainer?' · 👤 '+esc(b.trainer):'')+(b.kabine?' · 🚪 '+esc(b.kabine):'')+'</div></div></div>';
  }
  $('#app').innerHTML = html;
}

/* ---------- Buchungs-Formular ---------- */
function oeffneBuchung(id, platzId, datum){
  if (!istEditModus() && !id) return;
  const b = id ? S.buchungen.find(x=>x.id===id) : null;
  if (id && !b) return;
  const nurLesen = !!id && !istEditModus();
  const v = b || { id:'', platzId: platzId||S.config.plaetze[0].id, datum: datum||isoDatum(new Date()),
    von:'18:00', bis:'19:30', typ:'Training', mannschaft:S.config.mannschaften[0]||'', trainer:'', kabine:'', notiz:'' };

  const hg = document.createElement('div');
  hg.className = 'modal-hg';
  hg.innerHTML = '<div class="modal">'
    + '<h2>'+(nurLesen?'Buchung':(id?'Buchung bearbeiten':'Neue Buchung'))+'</h2>'
    + '<div class="hinweis" style="font-size:12.5px;color:var(--grau)">'+(nurLesen?'Zum Bearbeiten wird der interne Trainer-Zugang benötigt.':'')+'</div>'
    + '<label>Art</label><div class="segment" id="fTypSeg">'
    +   '<button type="button" data-typ="Spiel" class="'+(v.typ==='Spiel'?'aktiv':'')+'">Spiel</button>'
    +   '<button type="button" data-typ="Training" class="'+(v.typ==='Training'?'aktiv training':'')+'">Training</button></div>'
    + '<label>Platz</label><select id="fPlatz">'
    +   S.config.plaetze.map(p=>'<option value="'+p.id+'"'+(p.id===v.platzId?' selected':'')+'>'+esc(p.name)+'</option>').join('')+'</select>'
    + '<label>Datum</label><input type="date" id="fDatum" value="'+esc(v.datum)+'">'
    + '<div class="zeit-reihe"><div><label>Von</label><input type="time" id="fVon" step="300" value="'+esc(v.von)+'"></div>'
    +   '<div><label>Bis</label><input type="time" id="fBis" step="300" value="'+esc(v.bis)+'"></div></div>'
    + '<label>Mannschaft</label><select id="fMannschaft">'
    +   S.config.mannschaften.map(m=>'<option'+(m===v.mannschaft?' selected':'')+'>'+esc(m)+'</option>').join('')+'</select>'
    + '<label>Verantwortlicher Trainer</label>'
    + '<input id="fTrainer" list="trainerListe" value="'+esc(v.trainer)+'" placeholder="Name eingeben oder wählen">'
    + '<datalist id="trainerListe">'+S.config.trainer.map(t=>'<option>'+esc(t)+'</option>').join('')+'</datalist>'
    + '<label>Kabine</label><select id="fKabine"><option value="">– keine –</option>'
    +   S.config.kabinen.map(k=>'<option'+(k===v.kabine?' selected':'')+'>'+esc(k)+'</option>').join('')+'</select>'
    + '<label>Notiz (optional)</label><input id="fNotiz" value="'+esc(v.notiz||'')+'" placeholder="z. B. Gegner, Besonderheiten">'
    + '<div id="fWarnung"></div>'
    + '<div class="m-fuss">'
    +   (nurLesen ? '<button class="btn zweit" data-akt="zu">Schließen</button>'
      : (id?'<button class="btn gefahr" data-akt="loeschen">Löschen</button>':'')
        + '<button class="btn zweit" data-akt="zu">Abbrechen</button>'
        + '<button class="btn" data-akt="speichern">Speichern</button>')
    + '</div></div>';
  document.body.appendChild(hg);

  let typ = v.typ;
  hg.querySelectorAll('#fTypSeg button').forEach(btn => btn.onclick = () => {
    typ = btn.dataset.typ;
    hg.querySelectorAll('#fTypSeg button').forEach(x=>x.className = x.dataset.typ===typ ? ('aktiv'+(typ==='Training'?' training':'')) : '');
  });
  if (nurLesen) hg.querySelectorAll('input,select,#fTypSeg button').forEach(e=>e.disabled=true);

  hg.addEventListener('click', async ev => {
    if (ev.target===hg) { hg.remove(); return; }
    const akt = ev.target.dataset && ev.target.dataset.akt;
    if (!akt) return;
    if (akt==='zu') { hg.remove(); return; }
    if (akt==='loeschen') {
      if (!confirm('Diese Buchung wirklich löschen?')) return;
      hg.remove();
      speichere(st => { st.buchungen = st.buchungen.filter(x=>x.id!==id); },
        'Buchung gelöscht: '+v.mannschaft+' '+v.datum);
      return;
    }
    if (akt==='speichern') {
      const neu = {
        id: id || neueId(),
        platzId: hg.querySelector('#fPlatz').value,
        datum: hg.querySelector('#fDatum').value,
        von: hg.querySelector('#fVon').value,
        bis: hg.querySelector('#fBis').value,
        typ,
        mannschaft: hg.querySelector('#fMannschaft').value,
        trainer: hg.querySelector('#fTrainer').value.trim(),
        kabine: hg.querySelector('#fKabine').value,
        notiz: hg.querySelector('#fNotiz').value.trim()
      };
      if (!neu.datum || !neu.von || !neu.bis) { warnungAnzeigen(hg,'Bitte Datum und Uhrzeiten angeben.'); return; }
      if (neu.bis <= neu.von) { warnungAnzeigen(hg,'„Bis" muss nach „Von" liegen.'); return; }
      // Konfliktprüfung: Platz und Kabine
      const andere = S.buchungen.filter(x=>x.id!==neu.id);
      const platzKonflikt = andere.find(x=>x.platzId===neu.platzId && ueberlappt(x,neu));
      const kabinenKonflikt = neu.kabine && andere.find(x=>x.kabine===neu.kabine && ueberlappt(x,neu));
      if ((platzKonflikt || kabinenKonflikt) && !hg.dataset.bestaetigt) {
        let txt = [];
        if (platzKonflikt) txt.push('Platz belegt: '+platzKonflikt.mannschaft+' '+platzKonflikt.von+'–'+platzKonflikt.bis);
        if (kabinenKonflikt) txt.push('Kabine „'+neu.kabine+'" belegt: '+kabinenKonflikt.mannschaft+' '+kabinenKonflikt.von+'–'+kabinenKonflikt.bis);
        warnungAnzeigen(hg, '⚠ '+txt.join(' · ')+' — nochmal „Speichern" drücken, um trotzdem zu buchen.');
        hg.dataset.bestaetigt = '1';
        return;
      }
      hg.remove();
      speichere(st => {
        st.buchungen = st.buchungen.filter(x=>x.id!==neu.id);
        st.buchungen.push(neu);
        if (neu.trainer && !st.config.trainer.includes(neu.trainer)) st.config.trainer.push(neu.trainer);
      }, (id?'Buchung geändert: ':'Buchung: ')+neu.mannschaft+' '+neu.datum+' '+neu.von);
    }
  });
}
function warnungAnzeigen(hg, text){ hg.querySelector('#fWarnung').innerHTML = '<div class="warnung">'+esc(text)+'</div>'; }

/* ---------- Stammdaten ---------- */
function renderStammdaten(){
  const c = S.config;
  let html = '<div class="wochennav"><h2>Stammdaten bearbeiten</h2></div>';

  // Plätze
  html += '<div class="karte"><h3><span class="punkt"></span>Plätze</h3>'
    + '<div class="hinweis">Name und Verantwortlicher je Platz. Die vier Plätze sind fest.</div>';
  c.plaetze.forEach((p,i)=>{
    html += '<div class="sd-zeile">'
      + '<input value="'+esc(p.name)+'" placeholder="Platzname" onchange="aenderePlatz('+i+',\'name\',this.value)">'
      + '<input value="'+esc(p.verantwortlicher)+'" placeholder="Verantwortlicher" onchange="aenderePlatz('+i+',\'verantwortlicher\',this.value)">'
      + '</div>';
  });
  html += '</div>';

  // Mannschaften
  html += listenKarte('Mannschaften', 'mannschaften', c.mannschaften,
    'Liste frei erweiterbar – neue Mannschaft unten hinzufügen.');
  // Trainer
  html += listenKarte('Trainer', 'trainer', c.trainer,
    'Trainer erscheinen als Vorschlag im Buchungsformular. Neue Namen aus Buchungen werden automatisch ergänzt.');
  // Kabinen
  html += listenKarte('Kabinen', 'kabinen', c.kabinen,
    'Die vier Kabinen können umbenannt werden.', true);

  $('#app').innerHTML = html;
}
function listenKarte(titel, feld, liste, hinweis, ohneLoeschen){
  let html = '<div class="karte"><h3><span class="punkt"></span>'+titel+'</h3><div class="hinweis">'+hinweis+'</div>';
  liste.forEach((eintrag,i)=>{
    html += '<div class="sd-zeile"><input value="'+esc(eintrag)+'" onchange="aendereListe(\''+feld+'\','+i+',this.value)">'
      + (ohneLoeschen?'':'<button class="loeschen" title="Entfernen" onclick="entferneListe(\''+feld+'\','+i+')">✕</button>')
      + '</div>';
  });
  if (!ohneLoeschen) html += '<div class="hinzu"><input id="neu_'+feld+'" placeholder="Neuer Eintrag …">'
    + '<button class="btn zweit" onclick="fuegeListeHinzu(\''+feld+'\')">Hinzufügen</button></div>';
  return html + '</div>';
}
function aenderePlatz(i, feld, wert){
  speichere(st => { st.config.plaetze[i][feld] = wert.trim(); }, 'Platz aktualisiert');
}
function aendereListe(feld, i, wert){
  const alt = S.config[feld][i];
  wert = wert.trim(); if (!wert) return render();
  speichere(st => {
    st.config[feld][i] = wert;
    if (feld==='mannschaften') st.buchungen.forEach(b=>{ if (b.mannschaft===alt) b.mannschaft = wert; });
    if (feld==='kabinen') st.buchungen.forEach(b=>{ if (b.kabine===alt) b.kabine = wert; });
    if (feld==='trainer') st.buchungen.forEach(b=>{ if (b.trainer===alt) b.trainer = wert; });
  }, titelFuer(feld)+' umbenannt: '+alt+' → '+wert);
}
function entferneListe(feld, i){
  const eintrag = S.config[feld][i];
  if (!confirm('„'+eintrag+'" aus der Liste entfernen? Bestehende Buchungen bleiben erhalten.')) return;
  speichere(st => { st.config[feld].splice(i,1); }, titelFuer(feld)+' entfernt: '+eintrag);
}
function fuegeListeHinzu(feld){
  const inp = $('#neu_'+feld); const wert = (inp.value||'').trim();
  if (!wert) return;
  if (S.config[feld].includes(wert)) { toast('Eintrag existiert bereits'); return; }
  speichere(st => { if (!st.config[feld].includes(wert)) st.config[feld].push(wert); }, titelFuer(feld)+' hinzugefügt: '+wert);
}
function titelFuer(feld){ return {mannschaften:'Mannschaft',trainer:'Trainer',kabinen:'Kabine'}[feld]||feld; }

/* ---------- QR-Codes & Zugang ---------- */
function renderQr(){
  const basisUrl = location.origin + location.pathname;
  const token = holeToken();
  const internUrl = basisUrl + '#k=' + encodeURIComponent(utf8b64(token));
  const repo = ermittleRepo();

  let html = '<div class="wochennav"><h2>QR-Codes &amp; Zugang</h2></div><div class="qr-raster">';

  if (token) {
    html += '<div class="karte qr-karte"><span class="intern-band">INTERN · NUR VEREIN</span>'
      + '<div class="qr-titel">Trainer-Zugang</div>'
      + '<div class="qr-unter">Scannen schaltet Buchen &amp; Bearbeiten frei.<br>Nur im Vereinsheim / an Trainer ausgeben!</div>'
      + '<div class="qr-box">'+qrSvg(internUrl)+'</div>'
      + '<div class="url">'+esc(internUrl.slice(0,90))+'…</div></div>';
  } else {
    html += '<div class="karte qr-karte"><span class="intern-band">INTERN · NUR VEREIN</span>'
      + '<div class="qr-titel">Trainer-Zugang</div>'
      + '<div class="qr-unter">Sobald unten ein Zugangsschlüssel hinterlegt ist,<br>erscheint hier der interne QR-Code zum Ausdrucken.</div></div>';
  }

  html += '<div class="karte qr-karte"><span class="extern-band">EXTERN · ÖFFENTLICH</span>'
    + '<div class="qr-titel">Belegungsplan ansehen</div>'
    + '<div class="qr-unter">Für Aushang, Gastvereine und Eltern.<br>Nur Ansicht, kein Bearbeiten möglich.</div>'
    + '<div class="qr-box">'+qrSvg(basisUrl)+'</div>'
    + '<div class="url">'+esc(basisUrl)+'</div></div>';

  html += '</div><div class="karte kein-druck"><h3><span class="punkt"></span>Einstellungen</h3>'
    + '<label>GitHub-Repo (Besitzer/Name)</label>'
    + '<input id="eRepo" value="'+esc(repo)+'" placeholder="z. B. maxmuster/fct-platzbelegung"'
    + (location.hostname.endsWith('.github.io')?' disabled':'')+'>'
    + (location.hostname.endsWith('.github.io')?'<div class="hinweis" style="margin-top:4px">Wird auf GitHub Pages automatisch erkannt.</div>':'')
    + '<label>Zugangsschlüssel (Fine-grained Personal Access Token)</label>'
    + '<input id="eToken" type="password" value="'+esc(token)+'" placeholder="github_pat_…">'
    + '<div class="hinweis" style="margin-top:6px">Token auf GitHub erstellen: Settings → Developer settings → Fine-grained tokens → nur dieses Repo, Berechtigung „Contents: Read and write". Der interne QR-Code enthält diesen Schlüssel.</div>'
    + '<div class="m-fuss" style="max-width:420px">'
    + '<button class="btn" onclick="speichereZugang()">Übernehmen</button>'
    + '<button class="btn zweit" onclick="window.print()">🖨 QR-Codes drucken</button>'
    + '<button class="btn gefahr" onclick="abmelden()">Zugang entfernen</button></div></div>';

  $('#app').innerHTML = html;
}
function qrSvg(text){
  try {
    const qr = qrcode(0, 'M');
    qr.addData(text); qr.make();
    return qr.createSvgTag({ cellSize: 4, margin: 2, scalable: true });
  } catch(e){ return '<div class="hinweis">QR konnte nicht erzeugt werden</div>'; }
}
function speichereZugang(){
  const repoFeld = $('#eRepo');
  if (repoFeld && !repoFeld.disabled) localStorage.setItem('fct_repo', repoFeld.value.trim());
  const t = $('#eToken').value.trim();
  if (t) localStorage.setItem('fct_token', t); else localStorage.removeItem('fct_token');
  ladeDaten().then(render);
  toast('Zugang übernommen');
}
function abmelden(){
  if (!confirm('Trainer-Zugang auf diesem Gerät entfernen?')) return;
  localStorage.removeItem('fct_token');
  ansicht = 'woche'; render();
}

/* ================= Start ================= */
$('#fab').onclick = () => oeffneBuchung(null);
window.wechsle = wechsle; window.schiebeWoche = schiebeWoche; window.geheHeute = geheHeute;
window.oeffneBuchung = oeffneBuchung; window.aenderePlatz = aenderePlatz;
window.aendereListe = aendereListe; window.entferneListe = entferneListe;
window.fuegeListeHinzu = fuegeListeHinzu; window.speichereZugang = speichereZugang;
window.abmelden = abmelden;

render();
ladeDaten().then(render);
// Plan regelmäßig aktualisieren (z. B. Anzeige im Vereinsheim)
setInterval(()=>{ if (!speichertGerade) ladeDaten().then(render); }, 120000);
</script>
